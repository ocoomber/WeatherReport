<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SGP Weather Tool — Strange Goose Productions</title>
  <meta name="description" content="Multi-model weather comparison for film production crews. Compares 8 forecast models (UKMO, ECMWF, GFS, ICON, GEM, MF, KNMI, DMI) for UK locations.">
  <meta property="og:title" content="SGP Weather Tool">
  <meta property="og:description" content="Multi-model weather comparison for film production crews.">
  <meta property="og:type" content="website">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#D4A24E">
</head>
<body>

  <header class="brand-header">
    <div class="brand-mark">
      <img src="icon.svg" width="32" height="32" alt="" class="brand-icon">
      <h1 class="brand-name">Strange Goose Productions</h1>
      <span class="build-number">b038</span>
    </div>
    <p class="brand-subtitle">SGP Weather Tool</p>
  </header>

  <main class="app-main">
    <section class="input-section">
      <form id="search-form" class="search-form">
        <label for="postcode-input" class="visually-hidden">Enter UK postcode</label>
        <input
          type="text"
          id="postcode-input"
          class="postcode-input"
          placeholder="e.g. SW1A 1AA"
          autocomplete="postal-code"
          spellcheck="false"
          aria-describedby="input-hint"
          required
          pattern="[A-Za-z][A-Za-z0-9]{4,6}"
          maxlength="7"
        >
        <button type="submit" id="check-btn" class="check-btn">Check weather</button>
        <button type="button" id="locate-btn" class="locate-btn" title="Detect your location">Use my location</button>
      </form>
      <p id="input-hint" class="input-hint">Enter a UK postcode to see next Saturday's multi-model forecast</p>
    </section>

    <section id="status-area" class="status-area" aria-live="polite">
      <div id="loading-indicator" class="loading-indicator hidden">
        <div class="spinner"></div>
        <span>Fetching forecast…</span>
      </div>
      <div id="error-display" class="error-display hidden" role="alert"></div>
    </section>

    <section id="results-section" class="results-section hidden">
      <div class="results-header">
        <h2 id="forecast-heading" class="forecast-heading"></h2>
        <p id="sun-info" class="sun-info hidden"></p>
      </div>

      <div id="verdict-banner" class="verdict-banner hidden">
        <span id="verdict-icon" class="verdict-icon"></span>
        <div class="verdict-body">
          <span id="verdict-text" class="verdict-text"></span>
          <span id="verdict-summary" class="verdict-summary"></span>
        </div>
      </div>

      <div class="controls-row">
        <div class="date-control">
          <label for="forecast-date">Forecast date:</label>
          <input type="date" id="forecast-date" class="date-picker">
          <button type="button" id="update-btn" class="update-btn">Update</button>
        </div>
        <div class="hour-range-control">
          <label for="hour-start">Hours:</label>
          <select id="hour-start" class="hour-select"></select>
          <span class="hour-sep">to</span>
          <select id="hour-end" class="hour-select" aria-label="End hour"></select>
          <span id="range-hint" class="range-hint hidden"></span>
        </div>
      </div>

      <div id="period-summary" class="period-summary"></div>

      <div id="hour-strip-wrap" class="hour-strip-wrap">
        <div id="hour-strip" class="hour-strip"></div>
      </div>

      <details id="full-data-accordion" class="full-data-accordion">
        <summary id="accordion-summary">Show full model data</summary>
        <div id="tables-container" class="tables-container"></div>
      </details>
    </section>
  </main>

  <footer class="app-footer">
    <p>Data: <a href="https://open-meteo.com/" target="_blank" rel="noopener">Open-Meteo</a> ·
    Geocoding: <a href="https://postcodes.io/" target="_blank" rel="noopener">postcodes.io</a></p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
